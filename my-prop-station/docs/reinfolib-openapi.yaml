openapi: "3.0.3"
info:
  title: 不動産情報ライブラリ API
  description: |
    国土交通省が提供する不動産情報ライブラリの公開API仕様書。
    不動産価格情報、都市計画情報、防災情報、周辺施設情報などをプログラムから取得できる。

    ## 認証
    全てのリクエストに `Ocp-Apim-Subscription-Key` ヘッダーが必要。
    APIキーは https://www.reinfolib.mlit.go.jp/api/request/ から申請（審査約5営業日）。

    ## レスポンスのエンコーディング
    全レスポンスは gzip 圧縮されている。クライアント側で `Accept-Encoding: gzip` ヘッダーを付与するか、
    curl の `--compressed` フラグを使用すること。

    ## XYZタイル座標
    多くのAPIはXYZタイル座標方式でデータを取得する。
    緯度経度からタイル座標への変換は以下の計算式で行う:
    ```
    x = floor((lng + 180) / 360 * 2^zoom)
    y = floor((1 - log(tan(lat * π / 180) + 1 / cos(lat * π / 180)) / π) / 2 * 2^zoom)
    ```
    タイル座標の確認ツール: https://maps.gsi.go.jp/development/tileCoordCheck.html
  version: "1.0.0"
  contact:
    name: 国土交通省 不動産情報ライブラリ
    url: https://www.reinfolib.mlit.go.jp/
  license:
    name: 政府標準利用規約（第2.0版）準拠
    url: https://www.reinfolib.mlit.go.jp/help/termsOfUse/

servers:
  - url: https://www.reinfolib.mlit.go.jp/ex-api/external
    description: 本番環境

security:
  - apiKey: []

tags:
  - name: 価格情報
    description: 不動産価格・地価公示・鑑定評価書に関するAPI
  - name: 市区町村情報
    description: 都道府県・市区町村マスタデータ
  - name: 都市計画
    description: 区域区分・用途地域・立地適正化計画・防火地域
  - name: 防災・ハザード
    description: 洪水・高潮・津波・土砂災害・液状化・地すべり
  - name: 避難施設
    description: 指定緊急避難場所

# ==============================================================================
# パス定義
# ==============================================================================
paths:
  # ============================================================================
  # 価格情報
  # ============================================================================
  /XIT001:
    get:
      operationId: getTransactionPrices
      summary: 不動産価格（取引価格・成約価格）情報取得
      description: |
        2005年第3四半期以降の不動産取引価格情報、2021年以降の成約価格情報を取得する。
        area / city / station のいずれか最低1つを指定する必要がある。
      tags: [価格情報]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - name: year
          in: query
          required: true
          description: 取引年（YYYY形式）。取引価格は2005年以降、成約価格は2021年以降。
          schema:
            type: string
            pattern: '^\d{4}$'
            example: "2024"
        - name: quarter
          in: query
          required: true
          description: 四半期（1:Q1〜4:Q4）
          schema:
            type: string
            enum: ["1", "2", "3", "4"]
            example: "3"
        - name: area
          in: query
          required: false
          description: 都道府県コード（2桁）。複数指定時はカンマ区切り。area / city / station のいずれか1つは必須。
          schema:
            type: string
            pattern: '^\d{2}(,\d{2})*$'
            example: "13"
        - name: city
          in: query
          required: false
          description: 市区町村コード（5桁、全国地方公共団体コードの上5桁）。area / city / station のいずれか1つは必須。
          schema:
            type: string
            pattern: '^\d{5}$'
            example: "13101"
        - name: station
          in: query
          required: false
          description: 駅コード（6桁、国土数値情報駅データのグループコード）。area / city / station のいずれか1つは必須。
          schema:
            type: string
            pattern: '^\d{6}$'
        - name: priceClassification
          in: query
          required: false
          description: 価格情報区分
          schema:
            type: string
            enum: ["01", "02"]
            description: "01: 取引価格のみ、02: 成約価格のみ、未指定: 両方"
        - name: language
          in: query
          required: false
          schema:
            type: string
            enum: [ja, en]
            default: ja
          description: 出力言語
      responses:
        "200":
          description: 取引価格情報リスト（gzip圧縮JSON）
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransactionPrice"

  /XIT002:
    get:
      operationId: getMunicipalities
      summary: 都道府県内市区町村一覧取得
      description: 指定した都道府県に属する市区町村の一覧を取得する。
      tags: [市区町村情報]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - name: area
          in: query
          required: true
          description: 都道府県コード（2桁）
          schema:
            type: string
            pattern: '^\d{2}$'
            example: "13"
        - name: language
          in: query
          required: false
          schema:
            type: string
            enum: [ja, en]
            default: ja
      responses:
        "200":
          description: 市区町村一覧（gzip圧縮JSON）
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Municipality"

  # ============================================================================
  # 価格ポイント（タイル座標方式）
  # ============================================================================
  /XPT001:
    get:
      operationId: getTransactionPricePoints
      summary: 不動産価格ポイント
      description: |
        XYZタイル座標で指定した範囲内の不動産取引ポイント（最寄り駅ポイント）を取得する。
        同一ポイントに複数の取引情報が含まれる場合がある。
      tags: [価格情報]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
        - name: from
          in: query
          required: true
          description: 取引時期From（YYYYN形式。Nは四半期1〜4）
          schema:
            type: string
            pattern: '^\d{4}[1-4]$'
            example: "20241"
        - name: to
          in: query
          required: true
          description: 取引時期To（YYYYN形式）
          schema:
            type: string
            pattern: '^\d{4}[1-4]$'
            example: "20244"
        - name: priceClassification
          in: query
          required: false
          description: "価格区分コード（01: 取引価格、02: 成約価格）"
          schema:
            type: string
            enum: ["01", "02"]
        - name: landTypeCode
          in: query
          required: false
          description: "種類コード（01: 宅地(土地)、02: 宅地(土地建物)、07: 中古マンション等）"
          schema:
            type: string
            enum: ["01", "02", "07"]
      responses:
        "200":
          description: GeoJSON形式の不動産価格ポイント
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"

  /XPT002:
    get:
      operationId: getLandPricePoints
      summary: 地価公示・地価調査ポイント
      description: |
        XYZタイル座標で指定した範囲内の地価公示・地価調査ポイントを取得する。
        公示地価（毎年1月1日基準）と都道府県地価調査（毎年7月1日基準）の両方を含む。
      tags: [価格情報]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - name: z
          in: query
          required: true
          description: ズームレベル（13〜15）
          schema:
            type: integer
            minimum: 13
            maximum: 15
            example: 14
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
        - name: year
          in: query
          required: true
          description: 対象年（YYYY形式）
          schema:
            type: string
            pattern: '^\d{4}$'
            example: "2025"
        - name: priceClassification
          in: query
          required: false
          description: "地価区分（0: 公示のみ、1: 調査のみ、未指定: 両方）"
          schema:
            type: string
            enum: ["0", "1"]
        - name: useCategoryCode
          in: query
          required: false
          description: |
            用途区分コード（複数指定時はカンマ区切り）。
            00: 住宅地、03: 宅地見込地、05: 商業地、07: 準工業地、
            09: 工業地、10: 市街化調整区域内現況宅地、
            13: 市街化調整区域内現況林地（公示のみ）、20: 林地（調査のみ）
          schema:
            type: string
            example: "00,05"
      responses:
        "200":
          description: GeoJSON形式の地価ポイント
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"

  # ============================================================================
  # 都市計画
  # ============================================================================
  /XKT001:
    get:
      operationId: getAreaClassification
      summary: 都市計画決定GISデータ（区域区分）
      description: |
        市街化区域・市街化調整区域・非線引き区域などの区域区分データをタイル座標で取得する。
      tags: [都市計画]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の区域区分ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[139.7, 35.6], [139.8, 35.6], [139.8, 35.7], [139.7, 35.7], [139.7, 35.6]]]
                    properties:
                      prefecture: "東京都"
                      city_code: "13101"
                      city_name: "千代田区"
                      kubun_id: 1
                      area_classification_ja: "市街化区域"
                      decision_date: "令和3年3月30日"
                      decision_classification: ""
                      decision_maker: ""
                      notice_number: ""
                      first_decision_date: ""
                      notice_number_s: ""

  /XKT002:
    get:
      operationId: getUseDistrict
      summary: 都市計画決定GISデータ（用途地域）
      description: |
        用途地域（第一種低層住居専用地域〜工業専用地域）のポリゴンデータを取得する。
        建ぺい率・容積率も含まれる。Prop-Stationの役所調査シートの主要データソース。
      tags: [都市計画]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の用途地域ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[135.2, 34.7], [135.3, 34.7], [135.3, 34.8], [135.2, 34.8], [135.2, 34.7]]]
                    properties:
                      youto_id: 11
                      prefecture: "兵庫県"
                      city_code: "28100"
                      city_name: "神戸市"
                      use_area_ja: "準工業地域"
                      u_floor_area_ratio_ja: "300%"
                      u_building_coverage_ratio_ja: "80%"
                      decision_date: ""
                      decision_classification: ""
                      decision_maker: ""
                      notice_number: ""
                      first_decision_date: ""
                      notice_number_s: ""

  /XKT003:
    get:
      operationId: getLocationOptimizationPlan
      summary: 都市計画決定GISデータ（立地適正化計画）
      description: 居住誘導区域・都市機能誘導区域などの立地適正化計画データを取得する。
      tags: [都市計画]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の立地適正化計画ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"

  /XKT014:
    get:
      operationId: getFirePreventionDistrict
      summary: 都市計画決定GISデータ（防火地域・準防火地域）
      description: 防火地域・準防火地域のポリゴンデータを取得する。
      tags: [都市計画]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の防火地域ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[139.6, 35.4], [139.7, 35.4], [139.7, 35.5], [139.6, 35.5], [139.6, 35.4]]]
                    properties:
                      fire_prevention_ja: "準防火地域"
                      kubun_id: 25
                      prefecture: "神奈川県"
                      city_code: "14201"
                      city_name: "横須賀市"
                      decision_date: "令和3年2月25日"
                      decision_classification: ""
                      decision_maker: ""
                      notice_number: "市告示第29号"
                      first_decision_date: ""
                      notice_number_s: ""

  # ============================================================================
  # 防災・ハザード
  # ============================================================================
  /XKT021:
    get:
      operationId: getLandslidePreventionArea
      summary: 国土数値情報（地すべり防止地区）
      description: 地すべり防止地区のポリゴンデータを取得する。
      tags: [防災・ハザード]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
        - name: prefectureCode
          in: query
          required: false
          description: 都道府県コード（2桁、カンマ区切りで複数指定可）
          schema:
            type: string
            pattern: '^\d{2}(,\d{2})*$'
        - name: administrativeAreaCode
          in: query
          required: false
          description: 行政コード（5桁、カンマ区切りで複数指定可）
          schema:
            type: string
            pattern: '^\d{5}(,\d{5})*$'
      responses:
        "200":
          description: GeoJSON形式の地すべり防止地区ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"

  /XKT025:
    get:
      operationId: getLiquefactionTendency
      summary: 液状化発生傾向図
      description: |
        地形分類に基づく液状化発生傾向を6段階で評価したメッシュデータを取得する。
      tags: [防災・ハザード]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の液状化傾向メッシュ
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[139.7, 35.6], [139.71, 35.6], [139.71, 35.61], [139.7, 35.61], [139.7, 35.6]]]
                    properties:
                      mesh_code: "5339359931"
                      topographic_classification_code: 9
                      topographic_classification_name_ja: "ローム台地"
                      liquefaction_tendency_level: 5
                      note: "液状化しにくい"

  /XKT026:
    get:
      operationId: getFloodInundationArea
      summary: 国土数値情報（洪水浸水想定区域）
      description: |
        洪水浸水想定区域のポリゴンデータを取得する。
        一部の大規模・複雑なポリゴンは分割提供のため原典データと形状が一致しない場合がある。
      tags: [防災・ハザード]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - name: z
          in: query
          required: true
          description: ズームレベル（14〜15）
          schema:
            type: integer
            minimum: 14
            maximum: 15
            example: 14
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の洪水浸水想定区域ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[136.9, 36.7], [137.0, 36.7], [137.0, 36.8], [136.9, 36.8], [136.9, 36.7]]]
                    properties:
                      A31a_201: "8404090001"
                      A31a_202: "庄川"
                      A31a_203: "84"
                      A31a_204: "北陸地方整備局"
                      A31a_205: 1

  /XKT027:
    get:
      operationId: getStormSurgeInundationArea
      summary: 国土数値情報（高潮浸水想定区域）
      description: |
        高潮浸水想定区域のポリゴンデータを取得する。
        一部の大規模・複雑なポリゴンは分割提供のため原典データと形状が一致しない場合がある。
      tags: [防災・ハザード]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - name: z
          in: query
          required: true
          description: ズームレベル（13〜15）
          schema:
            type: integer
            minimum: 13
            maximum: 15
            example: 13
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の高潮浸水想定区域ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[136.5, 34.7], [136.6, 34.7], [136.6, 34.8], [136.5, 34.8], [136.5, 34.7]]]
                    properties:
                      A49_001: "三重県"
                      A49_002: "24"
                      A49_003: "5m以上10m未満"
                      target_year: 2021

  /XKT028:
    get:
      operationId: getTsunamiInundationArea
      summary: 国土数値情報（津波浸水想定）
      description: |
        津波浸水想定区域のポリゴンデータを取得する。
        一部の大規模・複雑なポリゴンは分割提供のため原典データと形状が一致しない場合がある。
      tags: [防災・ハザード]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - name: z
          in: query
          required: true
          description: ズームレベル（14〜15）
          schema:
            type: integer
            minimum: 14
            maximum: 15
            example: 14
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の津波浸水想定区域ポリゴン
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Polygon
                      coordinates: [[[139.8, 35.3], [139.9, 35.3], [139.9, 35.4], [139.8, 35.4], [139.8, 35.3]]]
                    properties:
                      A40_001: "東京都"
                      A40_002: "13"
                      A40_003: "3m以上～5m未満"
                      target_year: 2023

  /XKT029:
    get:
      operationId: getSedimentDisasterWarningArea
      summary: 国土数値情報（土砂災害警戒区域）
      description: |
        土砂災害警戒区域・特別警戒区域のポリゴン/ラインデータを取得する。
        一部地域ではラインデータを含む。
      tags: [防災・ハザード]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
