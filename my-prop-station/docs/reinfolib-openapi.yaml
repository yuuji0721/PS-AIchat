  # ============================================================================
  # 避難施設
  # ============================================================================
  /XGT001:
    get:
      operationId: getDesignatedEmergencyEvacuationSites
      summary: 指定緊急避難場所
      description: |
        各市区町村が指定した緊急避難場所のポイントデータを取得する。
        災害種別ごとの対応フラグ（洪水・崖崩れ・高潮・地震・津波・火事・内水氾濫・火山）を含む。
        データはリアルタイム同期ではないため、最新情報は各市町村に要確認。
      tags: [避難施設]
      parameters:
        - $ref: "#/components/parameters/apiKeyHeader"
        - $ref: "#/components/parameters/responseFormat"
        - $ref: "#/components/parameters/zoomLevel_11_15"
        - $ref: "#/components/parameters/tileX"
        - $ref: "#/components/parameters/tileY"
      responses:
        "200":
          description: GeoJSON形式の避難場所ポイント
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONFeatureCollection"
              example:
                type: FeatureCollection
                features:
                  - type: Feature
                    geometry:
                      type: Point
                      coordinates: [132.5, 34.4]
                    properties:
                      common_id: "341003-01-001"
                      prefecture_and_city: "広島県広島市"
                      facility_name_ja: "広島市民球場跡地"
                      address_ja: "広島市中区基町5番地"
                      flood_flag: true
                      landslide_flag: false
                      high_tide_flag: true
                      earthquake_flag: true
                      tsunami_flag: false
                      large_fire_flag: true
                      inland_flooding_flag: true
                      volcanic_phenomenon_flag: false
                      same_address_flag: true
                      remarks: "収容人数：約5,000人"

# ==============================================================================
# コンポーネント定義
# ==============================================================================
components:
  # ============================================================================
  # セキュリティスキーム
  # ============================================================================
  securitySchemes:
    apiKey:
      type: apiKey
      name: Ocp-Apim-Subscription-Key
      in: header
      description: |
        不動産情報ライブラリAPI利用申請で発行されたAPIキー。
        申請先: https://www.reinfolib.mlit.go.jp/api/request/
        審査期間: 約5営業日

  # ============================================================================
  # 共通パラメータ
  # ============================================================================
  parameters:
    apiKeyHeader:
      name: Ocp-Apim-Subscription-Key
      in: header
      required: true
      description: 発行されたAPIキー
      schema:
        type: string

    responseFormat:
      name: response_format
      in: query
      required: true
      description: "応答形式（geojson: GeoJSON形式、pbf: バイナリベクトルタイル形式）"
      schema:
        type: string
        enum: [geojson, pbf]
        example: geojson

    zoomLevel_11_15:
      name: z
      in: query
      required: true
      description: ズームレベル（11〜15。値が大きいほど詳細）
      schema:
        type: integer
        minimum: 11
        maximum: 15
        example: 14

    tileX:
      name: x
      in: query
      required: true
      description: XYZタイル座標のX値
      schema:
        type: integer
        example: 14626

    tileY:
      name: y
      in: query
      required: true
      description: XYZタイル座標のY値
      schema:
        type: integer
        example: 6020

  # ============================================================================
  # スキーマ定義
  # ============================================================================
  schemas:
    # --------------------------------------------------------------------------
    # 汎用GeoJSON
    # --------------------------------------------------------------------------
    GeoJSONFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [Feature]
              geometry:
                type: object
                description: GeoJSON Geometry（Point, Polygon, MultiPolygon, LineString等）
                properties:
                  type:
                    type: string
                    enum: [Point, Polygon, MultiPolygon, LineString, MultiLineString]
                  coordinates:
                    description: 座標配列（geometryタイプに応じた構造）
              properties:
                type: object
                description: API固有の属性データ（各APIのレスポンス仕様を参照）

